<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message ❤️</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }
        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            z-index: 10;
            width: 320px;
            border: 2px solid #ff4d6d;
        }
        h1 { color: #c9184a; margin-bottom: 2.5rem; font-size: 1.6rem; font-style: italic; line-height: 1.4; }
        
        .btns { 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 40px; /* Space between buttons */
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #yes { 
            background: #ff4d6d; 
            color: white; 
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            position: relative; /* Stays in place */
        }

        #no { 
            background: #adb5bd; 
            color: white; 
            position: relative; /* Starts next to Yes, then becomes absolute when moved */
            z-index: 100;
        }

        .celebration-img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: block;
        }

        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: float 4s linear forwards;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="mySong">
        <source src="https://instrumentalfx.co/wp-content/upload/10/Eed-sheeran-perfect-instrumentalfx.mp3" type="audio/mpeg">
    </audio>

    <div class="card" id="mainCard">
        <h1>Happily married again? 💍</h1>
        <div class="btns">
            <button id="yes" onclick="celebrate()">Yes</button>
            <button id="no" onmouseover="move()" ontouchstart="move()">No</button>
        </div>
    </div>

    <script>
        function move() {
            const no = document.getElementById('no');
            // Change to absolute only when it needs to move
            no.style.position = 'absolute';
            
            const x = Math.random() * (window.innerWidth - no.offsetWidth);
            const y = Math.random() * (window.innerHeight - no.offsetHeight);
            
            no.style.left = x + 'px';
            no.style.top = y + 'px';
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        function celebrate() {
            const audio = document.getElementById('mySong');
            audio.play();
            setInterval(createHeart, 300);
            
            const card = document.getElementById('mainCard');
            
            // Fixed Imgur URL for direct image viewing
            const photoUrl = "us.jpg"; 
 

            card.innerHTML = `
                <h1 style="color: #c9184a; margin-bottom: 10px;">❤️ YES! ❤️</h1>
                <p style="font-size: 1rem; color: #555; margin-bottom: 15px;">To a lifetime of love.</p>
                <img src="${photoUrl}" class="celebration-img" onerror="this.src='https://via.placeholder.com/300x400?text=I+Love+You'">
            `;
            document.body.style.background = "#ffb3c1";
        }
    </script>
</body>
</html>
